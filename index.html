<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MorphologyDocumenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/betareader.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&display=swap');
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .greek { font-family: 'EB Garamond', serif; font-size: 1.25rem; line-height: 1.4; }
        /* Target only disabled select elements */
        select:disabled {
          background-color: #f5f5f5;
          color: #a0a0a0;
          border-color: #d9d9d9;
          cursor: not-allowed; /* Shows a 'block' circle on hover */
          opacity: 1; /* Overrides default iOS/WebKit opacity reduction */
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center border-b pb-4 mb-6">
            <div>
                <h1 class="text-4xl font-semibold tracking-tight">MorphologyDocumenter</h1>
                <p class="text-slate-600 mt-1">Generate clean, validated morphological records for <a href="https://github.com/Eumaeus/Dramaturg.jl">Dramaturg.jl</a></p>
            </div>
            <div class="flex items-center gap-3">
                <a href="https://github.com/Eumaeus/Dramaturg.jl" target="_blank" class="px-4 py-2 text-sm font-medium bg-white border border-slate-300 hover:border-slate-400 rounded-lg flex items-center gap-2">
                    Project Repo
                </a>
                <div class="text-xs text-slate-500 text-right">
                    C. Blackwell, 2026<br>
                    Furman University, Department of Classics
                </div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-6">
            <!-- Left panel: Form -->
            <div class="col-span-12 lg:col-span-5 bg-white border rounded-2xl shadow-sm p-6">
                <h2 class="text-xl font-semibold mb-4">New Morphological Form</h2>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Editor’s Name</label>
                        <input id="editor-name" type="text" value="editor" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-indigo-400">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Text Token CTS-URN</label>
                        <input id="text-urn" type="text" value="urn:cts:greekLit:group.work:token" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-indigo-400 font-mono text-sm">
                    </div>
                </div>

                <!-- BetaCode -->
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">BetaCode Surface Form</label>
                        <input id="beta-surface" type="text" placeholder="a)popardh/somai" class="w-full px-3 py-3 border border-slate-300 rounded-lg focus:outline-none focus:border-indigo-400 font-mono text-lg">
                        <div class="mt-2 flex items-center gap-2">
                            <span class="text-xs text-slate-500">Unicode Surface:</span>
                            <input id="unicode-surface" readonly class="greek flex-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xl">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">BetaCode Lemma</label>
                        <input id="beta-lemma" type="text" placeholder="pe/rdomai" class="w-full px-3 py-3 border border-slate-300 rounded-lg focus:outline-none focus:border-indigo-400 font-mono text-lg">
                        <div class="mt-2 flex items-center gap-2">
                            <span class="text-xs text-slate-500">Unicode Lemma:</span>
                            <input id="unicode-lemma" readonly class="greek flex-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xl">
                        </div>
                    </div>

                    <!-- LSJ URN -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">LSJ URN</label>
                        <div class="flex gap-2">
                            <input id="lsj-urn" type="text" placeholder="urn:cite2:hmt:lsj.chicago_md:n81011" class="flex-1 px-3 py-3 border border-slate-300 rounded-lg focus:outline-none focus:border-indigo-400 font-mono text-sm" oninput="validateLsjUrn()">
                            <div id="lsj-status" class="px-4 py-3 text-sm font-medium rounded-lg flex items-center w-32"></div>
                        </div>
                    </div>

                    <!-- Intelligent POS Tag Builder -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Morphological Features (POSTag)</label>
                        <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 space-y-4">
                            <div class="grid grid-cols-2 gap-4">

                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">1. Part of Speech</label>
                                    <!--
                                    ### 1:  part of speech
                                    - n noun
                                    - v verb
                                    - g particle
                                    - a adjective
                                    - d adverb
                                    - c conjunction
                                    - r preposition
                                    - p pronoun
                                    - m numeral
                                    - i interjection
                                    - e exclamation
                                    - u punctuation
                                    -->
                                    <select id="pos-select" onchange="updateMenusAndPreview()" class="px-3 py-2 border border-slate-300 rounded-lg">
                                        <option value="-">-</option>
                                        <option value="n">Noun</option>
                                        <option value="v">Verb</option>
                                        <option value="l">Article</option>
                                        <option value="g">Particle</option>
                                        <option value="a">Adjective</option>
                                        <option value="p">Pronoun</option>
                                        <option value="d">Adverb</option>
                                        <option value="c">Conjunction</option>
                                        <option value="r">Preposition</option>
                                        <option value="i">Interjection</option>
                                        <option value="u">Punctuation</option>
                                        <option value="m">Numeral</option>
                                        <option value="x">Irregular</option>
                                    </select>
                                </div>

                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">2. Person</label>
                                    <!--
                                    ### 2:  person
                                        
                                    - 1 first person
                                    - 2 second person
                                    - 3 third person
                                    -->                                    
                                    <select id="person-select" onchange="updatePOSTagPreview()" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option>
                                        <option value="1">First person</option>
                                        <option value="2">Second person</option>
                                        <option value="3">Third person</option>
                                    </select>
                                </div>


                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">3. Number</label>
                                    <!--
                                    ### 3:  number
                                    - s singular
                                    - d dual
                                    - p plural
                                    -->
                                    <select id="number-select" onchange="updatePOSTagPreview()" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option>
                                        <option value="s">Singular</option>
                                        <option value="d">Dual</option>
                                        <option value="p">Plural</option>
                                    </select>
                                </div>

                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">4. Tense</label>
                                    <!-- 
                                    ### 4:  tense
                                        
                                    - p   present
                                    - i   imperfect
                                    - r   perfect
                                    - l   pluperfect
                                    - t   future perfect
                                    - f   future
                                    - a   aorist
                                    -->
                                    <select id="tense-select" onchange="updatePOSTagPreview()" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option>
                                        <option value="p">Present</option>
                                        <option value="a">Aorist</option>
                                        <option value="f">Future</option>
                                        <option value="i">Imperfect</option>
                                        <option value="r">Perfect</option>
                                        <option value="l">Pluperfect</option>
                                        <option value="t">Future perfect</option>
                                    </select>
                                </div>

                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">5. Mood</label>
                                    <!--
                                    ### 5:  mood
                                    - i indicative
                                    - s subjunctive
                                    - o optative
                                    - n infinitive
                                    - m imperative
                                    - p participle
                                    -->
                                    <select id="mood-select" onchange="updateMenusAndPreview()" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option>
                                        <option value="i">Indicative</option>
                                        <option value="s">Subjunctive</option>
                                        <option value="m">Imperative</option>
                                        <option value="o">Optative</option>
                                        <option value="n">Infinitive</option>
                                        <option value="p">Participle</option>
                                    </select>
                                </div>

                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">6. Voice</label>
                                    <!--
                                    ### 6:  voice
                                        
                                    - a active
                                    - p passive
                                    - m middle
                                    - e medio-passive
                                    -->
                                    <select id="voice-select" onchange="updatePOSTagPreview()" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option>
                                        <option value="a">Active</option>
                                        <option value="m">Middle</option>
                                        <option value="p">Passive</option>
                                        <option value="e">Medio-passive</option>
                                    </select>
                                </div>

                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">7. Gender</label>
                                    <!--
                                    ### 7:  gender
                                    - m masculine
                                    - f feminine
                                    - n neuter
                                    -->
                                    <select id="gender-select" onchange="updatePOSTagPreview()" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option>
                                        <option value="m">Masculine</option>
                                        <option value="f">Feminine</option>
                                        <option value="n">Neuter</option>
                                    </select>
                                </div>

                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">8. Case</label>
                                    <!--
                                    ### 8:  case
                                    - g genitive
                                    - d dative
                                    - a accusative
                                    - b ablative
                                    - v vocative
                                    - l locative
                                    -->
                                    <select id="case-select" onchange="updatePOSTagPreview()" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option>
                                        <option value="n">Nominative</option>
                                        <option value="g">Genitive</option>
                                        <option value="d">Dative</option>
                                        <option value="a">Accusative</option>
                                        <option value="v">Vocative</option>
                                    </select>
                                </div>


                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">9. Degree</label>
                                    <!--
                                    ### 9:  degree
                                    - c comparative
                                    - s superlative
                                    -->
                                    <select id="degree-select" onchange="updatePOSTagPreview()" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option>
                                        <option value="c">Comparative</option>
                                        <option value="s">Duperlative</option>
                                    </select>
                                </div>

                            </div>


                            <div class="flex items-center justify-between pt-2 border-t">
                                <div class="flex items-center gap-3">
                                    <span class="text-xs font-medium text-slate-500">POSTag</span>
                                    <span id="pos-preview" class="font-mono text-2xl tracking-[3px] bg-white border border-slate-300 px-5 py-2 rounded-2xl">---------</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-3 pt-4 border-t">
                        <button onclick="addOrUpdateEntry()" id="add-button"
                                class="flex-1 py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-2xl text-lg flex items-center justify-center gap-2">
                            <span class="text-2xl">+</span>
                            <span id="button-text">ADD TO LIST</span>
                        </button>
                        <button onclick="clearForm()" class="px-8 py-4 border border-slate-300 hover:border-slate-400 font-medium rounded-2xl text-slate-700">Clear Form</button>
                    </div>
                </div>
            </div>

            <!-- Right panel: List -->
            <div class="col-span-12 lg:col-span-7">
                <div class="bg-white border rounded-2xl shadow-sm p-6 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold">Generated Entries (<span id="entry-count" class="text-emerald-600">0</span>)</h2>
                        <button onclick="downloadBothFiles()" class="px-6 py-2 bg-amber-500 hover:bg-amber-600 text-white font-medium rounded-xl flex items-center gap-2 text-sm">
                            📥 Download Both TSVs
                        </button>
                    </div>

                    <div class="flex-1 overflow-auto border rounded-xl">
                        <table class="w-full text-sm" id="entries-table">
                            <thead class="bg-slate-100 sticky top-0">
                                <tr>
                                    <th class="px-4 py-3 text-left">Surface</th>
                                    <th class="px-4 py-3 text-left">Lemma</th>
                                    <th class="px-4 py-3 text-left">POSTag</th>
                                    <th class="px-4 py-3 text-left">LSJ</th>
                                    <th class="px-4 py-3 text-right w-20">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="entries-body" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== STATE ====================
        let lsjUrns = new Set();
        let entries = [];
        let currentEditIndex = -1;

        // ==================== BETA CODE → UNICODE (YOUR UPDATED VERSION) ====================
        function betaToUnicode(beta) {
            if (!beta || typeof beta !== "string") return "";
            let br  = new betareader(); 
            let input = beta.trim();
            let output = br.transcodeGreek(input);
            return output;
        }

        function updateUnicodeFields() {
            document.getElementById("unicode-surface").value = betaToUnicode(document.getElementById("beta-surface").value);
            document.getElementById("unicode-lemma").value = betaToUnicode(document.getElementById("beta-lemma").value);
        }

        // ==================== LSJ URN ====================
        async function loadLsjUrns() {
            try {
                const res = await fetch("./lsj_urns.txt");
                const text = await res.text();
                lsjUrns = new Set(text.trim().split("\n").map(l => l.trim()).filter(l => l.startsWith("urn:cite2:hmt:lsj.chicago_md:")));
            } catch(e) {
                document.getElementById("lsj-status").innerHTML = `<span class="text-amber-500">No lsj_urns.txt</span>`;
            }
        }

        function validateLsjUrn() {
            const el = document.getElementById("lsj-status");
            const val = document.getElementById("lsj-urn").value.trim();
            if (!val) { el.innerHTML = ""; return; }
            if (lsjUrns.has(val)) {
                el.innerHTML = `<span class="text-emerald-600">valid</span>`;
            } else {
                el.innerHTML = `<span class="text-red-500">invalid</span>`;
            }
        }

        // ==================== POSTAG MAPPING ====================
        const posMap = {"-":"-", "n":"n", "v":"v", "g":"g", "l":"l", "a":"a", "p":"p", "d":"d", "c":"c", "r":"r", "i":"i", "u":"u", "m":"m", "x":"x"};
        const caseMap = {"-":"-", "n":"n", "g":"g", "d":"d", "a":"a", "v":"v"};
        const numberMap = {"-":"-","s":"s","d":"d","p":"p"};
        const degreeMap = {"-":"-","c":"c","s":"s"};
        const moodMap = {"-":"-", "i":"i", "s":"s", "m":"m", "o":"o", "n":"n", "p":"p"};
        const voiceMap = {"-":"-", "a":"a", "m":"m", "p":"p", "e":"e"};
        const tenseMap = {"-":"-", "p":"p", "a":"a", "f":"f", "i":"i", "r":"r", "l":"l", "t":"t"};
        const genderMap = {"-":"-","m":"m","f":"f","n":"n"};
        const personMap = {"-":"-","1":"1","2":"2","3":"3"};

        function buildPOSTag() {
            const posVal = document.getElementById("pos-select").value;
            if (posVal === "-") return "---------";
            let tag = posMap[posVal] || "-";
            tag += personMap[document.getElementById("person-select").value] || "-";
            tag += numberMap[document.getElementById("number-select").value] || "-";
            tag += tenseMap[document.getElementById("tense-select").value] || "-";
            tag += moodMap[document.getElementById("mood-select").value] || "-";
            tag += voiceMap[document.getElementById("voice-select").value] || "-";
            tag += genderMap[document.getElementById("gender-select").value] || "-";
            tag += caseMap[document.getElementById("case-select").value] || "-";
            tag += degreeMap[document.getElementById("degree-select").value] || "-";
            return tag;
        }

        function updatePOSTagPreview() {
            document.getElementById("pos-preview").textContent = buildPOSTag();
        }

        function updateMenusAndPreview() {
            updateEnabledMenus();
            updatePOSTagPreview();
        }

        function updateEnabledMenus() {
            const pos = document.getElementById("pos-select").value;
            const allSelects = ["case","gender","number","degree","mood","voice","tense","person"].map(id => document.getElementById(id+"-select"));
            allSelects.forEach(s => s.disabled = true);

            if (["n","p","l"].includes(pos)) {
                ["case","gender","number"].forEach(id => document.getElementById(id+"-select").disabled = false);
            } else if (pos === "a") {
                ["case","gender","number","degree"].forEach(id => document.getElementById(id+"-select").disabled = false);
            } else if (pos === "v") {
                document.getElementById("mood-select").disabled = false;
                const mood = document.getElementById("mood-select").value;
                if (["i","s","m","o"].includes(mood)) {
                    ["voice","tense","person","number"].forEach(id => document.getElementById(id+"-select").disabled = false);
                } else if (mood === "n") {
                    ["voice","tense"].forEach(id => document.getElementById(id+"-select").disabled = false);
                } else if (mood === "p") {
                    ["voice","tense","case","number", "gender"].forEach(id => document.getElementById(id+"-select").disabled = false);
                }
            } else if (pos === "d") {
                document.getElementById("degree-select").disabled = false;
            }
            updatePOSTagPreview();
        }

        // ==================== ENTRY MANAGEMENT ====================
        function addOrUpdateEntry() {
            const postag = buildPOSTag();
            const posCategory = document.getElementById("pos-select").value;

            const entry = {
                editor: document.getElementById("editor-name").value,
                textUrn: document.getElementById("text-urn").value,
                betaSurface: document.getElementById("beta-surface").value,
                unicodeSurface: document.getElementById("unicode-surface").value,
                betaLemma: document.getElementById("beta-lemma").value,
                unicodeLemma: document.getElementById("unicode-lemma").value,
                lsjUrn: document.getElementById("lsj-urn").value,
                posCategory: posCategory,
                pos: postag,
                case: document.getElementById("case-select").value,
                gender: document.getElementById("gender-select").value,
                number: document.getElementById("number-select").value,
                degree: document.getElementById("degree-select").value,
                mood: document.getElementById("mood-select").value,
                voice: document.getElementById("voice-select").value,
                tense: document.getElementById("tense-select").value,
                person: document.getElementById("person-select").value
            };

            if (currentEditIndex >= 0) {
                entries[currentEditIndex] = entry;
                currentEditIndex = -1;
            } else {
                entries.push(entry);
            }

            renderEntries();
            clearForm();
        }

        // ==================== ENTRY MANAGEMENT (updated with delete) ====================
        function renderEntries() {
            const tbody = document.getElementById("entries-body");
            tbody.innerHTML = "";
            entries.forEach((e, i) => {
                const tr = document.createElement("tr");
                tr.className = "hover:bg-slate-50 cursor-pointer";
                tr.innerHTML = `
                    <td class="px-4 py-3">${e.unicodeSurface || e.betaSurface}</td>
                    <td class="px-4 py-3 greek">${e.unicodeLemma}</td>
                    <td class="px-4 py-3 font-mono text-xs tracking-[2px]">${e.pos}</td>
                    <td class="px-4 py-3 font-mono text-xs">${e.lsjUrn || "-"}</td>
                    <td class="px-4 py-3 text-right">
                        <button 
                            onclick="event.stopPropagation(); removeEntry(${i});"
                            class="text-red-500 hover:text-red-700 px-3 py-1 rounded-lg hover:bg-red-100 transition-colors">
                            🗑️
                        </button>
                    </td>
                `;
                tr.onclick = () => editEntry(i);
                tbody.appendChild(tr);
            });
            document.getElementById("entry-count").textContent = entries.length;
        }

        function removeEntry(index) {
            const entry = entries[index];
            const displayName = entry.unicodeSurface || entry.betaSurface || "this entry";
            if (confirm(`Remove "${displayName}" from the list?`)) {
                entries.splice(index, 1);
                // If we were editing this entry, cancel the edit
                if (currentEditIndex === index) {
                    currentEditIndex = -1;
                    clearForm();
                } else if (currentEditIndex > index) {
                    currentEditIndex--; // adjust index if needed
                }
                renderEntries();
            }
        }

        function editEntry(index) {
            const e = entries[index];
            currentEditIndex = index;
            document.getElementById("editor-name").value = e.editor;
            document.getElementById("text-urn").value = e.textUrn;
            document.getElementById("beta-surface").value = e.betaSurface;
            document.getElementById("beta-lemma").value = e.betaLemma;
            updateUnicodeFields();
            document.getElementById("lsj-urn").value = e.lsjUrn;
            document.getElementById("pos-select").value = e.posCategory || "-";
            document.getElementById("case-select").value = e.case || "-";
            document.getElementById("gender-select").value = e.gender || "-";
            document.getElementById("number-select").value = e.number || "-";
            document.getElementById("degree-select").value = e.degree || "-";
            document.getElementById("mood-select").value = e.mood || "-";
            document.getElementById("voice-select").value = e.voice || "-";
            document.getElementById("tense-select").value = e.tense || "-";
            document.getElementById("person-select").value = e.person || "-";

            updateEnabledMenus();
            document.getElementById("button-text").textContent = "UPDATE ENTRY";
        }

        function clearForm() {
            document.getElementById("beta-surface").value = "";
            document.getElementById("beta-lemma").value = "";
            document.getElementById("unicode-surface").value = "";
            document.getElementById("unicode-lemma").value = "";
            document.getElementById("lsj-urn").value = "";
            document.getElementById("pos-select").value = "-";
            ["case","gender","number","degree","mood","voice","tense","person"].forEach(id => {
                const sel = document.getElementById(id+"-select");
                sel.value = "-";
                sel.disabled = true;
            });
            currentEditIndex = -1;
            document.getElementById("button-text").textContent = "ADD TO LIST";
            updateUnicodeFields();
            updatePOSTagPreview();
        }

        // ==================== DOWNLOAD — SAFARI-FRIENDLY VERSION ====================
        function downloadBothFiles() {
            const editor = document.getElementById("editor-name").value.trim() || "editor";
            const safeEditor = editor.replace(/[^a-zA-Z0-9]/g, "_");
            const date = new Date().toISOString().split("T")[0];
            const longerdate = date + "-" + new Date().toISOString().split("T")[1].split(":")[0];

            // Build rows (same data for both files)
            let rows = "";
            let indexRows = "";
            entries.forEach(e => {
                const ucForm = e.unicodeSurface || "";
                const bcForm = e.betaSurface || "";
                const ucLemma = e.unicodeLemma || "";
                const bcLemma = e.betaLemma || "";
                const lsj = e.lsjUrn || "";
                const postag = e.pos || "---------";
                const tokenUrn = e.textUrn || "";

                rows += `${ucForm}\t${bcForm}\t${ucLemma}\t${bcLemma}\t${lsj}\t${postag}\n`;
                indexRows += `${tokenUrn}\t${ucForm}\t${bcForm}\t${ucLemma}\t${bcLemma}\t${lsj}\t${postag}\n`;
            });

            // === File 1: Morphological Dictionary (downloads immediately) ===
            const dictBlob = new Blob([rows], { type: "text/tab-separated-values" });
            const dictUrl = URL.createObjectURL(dictBlob);
            const a1 = document.createElement("a");
            a1.href = dictUrl;
            a1.download = `md_${safeEditor}_For_morphological_dictionary_${longerdate}.tsv`;
            a1.click();
            URL.revokeObjectURL(dictUrl);

            // === File 2: Editors Index (delayed for Safari) ===
            setTimeout(() => {
                const indexBlob = new Blob([indexRows], { type: "text/tab-separated-values" });
                const indexUrl = URL.createObjectURL(indexBlob);
                const a2 = document.createElement("a");
                a2.href = indexUrl;
                a2.download = `ei_${safeEditor}_For_editors_index_${longerdate}.tsv`;
                a2.click();
                URL.revokeObjectURL(indexUrl);
            }, 1500); // 1.5 seconds — works reliably in Safari; you can tweak to 1000 or 2000 if desired
        }

        // ==================== INIT ====================
        window.onload = () => {
            loadLsjUrns();

            // Select the text-urn field, for easy pasting over the default
            const textUrnField = document.getElementById('text-urn');
            textUrnField.select(); 

            // Reliable Unicode updates (fixes the previous ReferenceError)
            const betaSurface = document.getElementById("beta-surface");
            const betaLemma = document.getElementById("beta-lemma");
            betaSurface.addEventListener("input", updateUnicodeFields);
            betaLemma.addEventListener("input", updateUnicodeFields);

            updatePOSTagPreview();
        };
    </script>
</body>
</html>
