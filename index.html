<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MorphologyDocumenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&display=swap');
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .greek { font-family: 'EB Garamond', serif; font-size: 1.25rem; line-height: 1.4; }
        .tag-input { font-family: monospace; letter-spacing: 1px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="max-w-6xl mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center border-b pb-4 mb-6">
            <div>
                <h1 class="text-4xl font-semibold tracking-tight">MorphologyDocumenter</h1>
                <p class="text-slate-600 mt-1">Generate clean, validated morphological records for Dramaturg.jl</p>
            </div>
            <div class="flex items-center gap-3">
                <a href="https://github.com/Eumaeus/Dramaturg.jl" target="_blank" class="px-4 py-2 text-sm font-medium bg-white border border-slate-300 hover:border-slate-400 rounded-lg flex items-center gap-2">
                    Project Repo
                </a>
                <div class="text-xs text-slate-500 text-right">
                    Stand-alone webapp<br>
                    Place <span class="font-mono text-amber-600">lsj_urns.txt</span> for LSJ validation
                </div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-6">
            <!-- Left panel: Form -->
            <div class="col-span-12 lg:col-span-5 bg-white border rounded-2xl shadow-sm p-6">
                <h2 class="text-xl font-semibold mb-4">New Morphological Form</h2>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Editor’s Name</label>
                        <input id="editor-name" type="text" value="editor" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-indigo-400">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Text Token CTS-URN</label>
                        <input id="text-urn" type="text" value="urn:cts:greekLit:group.work:token" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-indigo-400 font-mono text-sm">
                    </div>
                </div>

                <!-- BetaCode -->
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">BetaCode Surface Form</label>
                        <input id="beta-surface" type="text" placeholder="a)popardh/somai" class="w-full px-3 py-3 border border-slate-300 rounded-lg focus:outline-none focus:border-indigo-400 font-mono text-lg" oninput="updateUnicodeFields()">
                        <div class="mt-2 flex items-center gap-2">
                            <span class="text-xs text-slate-500">Unicode Surface:</span>
                            <input id="unicode-surface" readonly class="greek flex-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xl">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">BetaCode Lemma</label>
                        <input id="beta-lemma" type="text" placeholder="pe/rdomai" class="w-full px-3 py-3 border border-slate-300 rounded-lg focus:outline-none focus:border-indigo-400 font-mono text-lg" oninput="updateUnicodeFields()">
                        <div class="mt-2 flex items-center gap-2">
                            <span class="text-xs text-slate-500">Unicode Lemma:</span>
                            <input id="unicode-lemma" readonly class="greek flex-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xl">
                        </div>
                    </div>

                    <!-- LSJ URN -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">LSJ URN</label>
                        <div class="flex gap-2">
                            <input id="lsj-urn" type="text" placeholder="urn:cite2:hmt:lsj.chicago_md:n81011" class="flex-1 px-3 py-3 border border-slate-300 rounded-lg focus:outline-none focus:border-indigo-400 font-mono text-sm" oninput="validateLsjUrn()">
                            <div id="lsj-status" class="px-4 py-3 text-sm font-medium rounded-lg flex items-center w-32"></div>
                        </div>
                    </div>

                    <!-- Intelligent POS Tag Builder -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Morphological Features (POS Tag)</label>
                        <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 space-y-4">
                            <!-- Part of Speech -->
                            <div class="flex flex-col">
                                <label class="text-xs font-medium text-slate-500 mb-1">Part of Speech</label>
                                <select id="pos-select" onchange="updateEnabledMenus()" class="px-3 py-2 border border-slate-300 rounded-lg">
                                    <option value="-">-</option>
                                    <option value="noun">Noun</option>
                                    <option value="pronoun">Pronoun</option>
                                    <option value="article">Article</option>
                                    <option value="adjective">Adjective</option>
                                    <option value="verb">Verb</option>
                                    <option value="adverb">Adverb</option>
                                    <option value="preposition">Preposition</option>
                                    <option value="conjunction">Conjunction</option>
                                    <option value="interjection">Interjection</option>
                                    <option value="punctuation">Punctuation</option>
                                    <option value="irregular">Irregular</option>
                                </select>
                            </div>

                            <!-- Conditional menus -->
                            <div class="grid grid-cols-2 gap-4">
                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">Case</label>
                                    <select id="case-select" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option><option value="nom">nom</option><option value="gen">gen</option>
                                        <option value="dat">dat</option><option value="acc">acc</option><option value="voc">voc</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">Gender</label>
                                    <select id="gender-select" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option><option value="m">m</option><option value="f">f</option><option value="n">n</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">Number</label>
                                    <select id="number-select" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option><option value="s">s</option><option value="d">d</option><option value="p">p</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">Degree</label>
                                    <select id="degree-select" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option><option value="c">comparative</option><option value="s">superlative</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">Mood</label>
                                    <select id="mood-select" onchange="updateEnabledMenus()" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option><option value="ind">indicative</option><option value="sub">subjunctive</option>
                                        <option value="imp">imperative</option><option value="opt">optative</option><option value="inf">infinitive</option>
                                        <option value="part">participle</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">Voice</label>
                                    <select id="voice-select" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option><option value="act">active</option><option value="mid">middle</option><option value="pas">passive</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">Tense</label>
                                    <select id="tense-select" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option><option value="pres">present</option><option value="impf">imperfect</option>
                                        <option value="fut">future</option><option value="aor">aorist</option><option value="perf">perfect</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-xs font-medium text-slate-500 mb-1">Person</label>
                                    <select id="person-select" class="px-3 py-2 border border-slate-300 rounded-lg" disabled>
                                        <option value="-">-</option><option value="1">1</option><option value="2">2</option><option value="3">3</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Preview -->
                            <div class="flex items-center justify-between pt-2 border-t">
                                <span class="font-mono text-xl tracking-widest bg-white border px-4 py-2 rounded-lg" id="pos-preview">v1sfim---</span>
                                <button onclick="validateAndSetPos()" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-xl">Validate &amp; Use Tag</button>
                            </div>
                        </div>
                    </div>

                    <!-- Action buttons -->
                    <div class="flex gap-3 pt-4 border-t">
                        <button onclick="addOrUpdateEntry()" id="add-button"
                                class="flex-1 py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-2xl text-lg flex items-center justify-center gap-2">
                            <span class="text-2xl">+</span>
                            <span id="button-text">ADD TO LIST</span>
                        </button>
                        <button onclick="clearForm()" class="px-8 py-4 border border-slate-300 hover:border-slate-400 font-medium rounded-2xl text-slate-700">Clear Form</button>
                    </div>
                </div>
            </div>

            <!-- Right panel: List -->
            <div class="col-span-12 lg:col-span-7">
                <div class="bg-white border rounded-2xl shadow-sm p-6 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold">Generated Entries (<span id="entry-count" class="text-emerald-600">0</span>)</h2>
                        <button onclick="downloadBothFiles()" class="px-6 py-2 bg-amber-500 hover:bg-amber-600 text-white font-medium rounded-xl flex items-center gap-2 text-sm">
                            📥 Download Both TSVs
                        </button>
                    </div>

                    <div class="flex-1 overflow-auto border rounded-xl">
                        <table class="w-full text-sm" id="entries-table">
                            <thead class="bg-slate-100 sticky top-0">
                                <tr>
                                    <th class="px-4 py-3 text-left">Surface</th>
                                    <th class="px-4 py-3 text-left">Lemma</th>
                                    <th class="px-4 py-3 text-left">POS</th>
                                    <th class="px-4 py-3 text-left">LSJ</th>
                                </tr>
                            </thead>
                            <tbody id="entries-body" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== STATE ====================
        let lsjUrns = new Set();
        let entries = [];
        let currentEditIndex = -1;

        // ==================== BETA CODE CONVERTER (with terminal sigma) ====================
        function betaToUnicode(beta) {
            if (!beta || typeof beta !== "string") return "";
            let input = beta.trim();
            let result = "";
            let i = 0;

            const letterMap = { /* same map as before – omitted for brevity but identical */ 
                "a":"α","b":"β","g":"γ","d":"δ","e":"ε","z":"ζ","h":"η","q":"θ","i":"ι","k":"κ","l":"λ","m":"μ","n":"ν","c":"ξ","o":"ο","p":"π","r":"ρ","s":"σ","t":"τ","u":"υ","f":"φ","x":"χ","y":"ψ","w":"ω",
                "A":"Α","B":"Β","G":"Γ","D":"Δ","E":"Ε","Z":"Ζ","H":"Η","Q":"Θ","I":"Ι","K":"Κ","L":"Λ","M":"Μ","N":"Ν","C":"Ξ","O":"Ο","P":"Π","R":"Ρ","S":"Σ","T":"Τ","U":"Υ","F":"Φ","X":"Χ","Y":"Ψ","W":"Ω"
            };

            while (i < input.length) {
                let ch = input[i];
                if (ch === "*") { i++; if (i < input.length) ch = input[i].toUpperCase(); else break; }
                if (letterMap[ch]) {
                    result += letterMap[ch];
                    i++;
                    if (i < input.length) {
                        let next = input[i];
                        let base = result.slice(-1);
                        if (next === ")") { result = result.slice(0,-1) + (base + "\u0301").normalize("NFC"); i++; }
                        else if (next === "(") { result = result.slice(0,-1) + (base + "\u0300").normalize("NFC"); i++; }
                        else if (next === "/") { result = result.slice(0,-1) + (base + "\u0342").normalize("NFC"); i++; }
                        else if (next === "=") { result = result.slice(0,-1) + (base + "\u0345").normalize("NFC"); i++; }
                        else if (next === "|") { result = result.slice(0,-1) + (base + "\u0308").normalize("NFC"); i++; }
                    }
                } else {
                    result += ch; i++;
                }
            }

            // TERMINAL SIGMA RULE (as requested)
            if (result.endsWith("σ")) {
                result = result.slice(0, -1) + "ς";
            }
            return result;
        }

        function updateUnicodeFields() {
            document.getElementById("unicode-surface").value = betaToUnicode(document.getElementById("beta-surface").value);
            document.getElementById("unicode-lemma").value = betaToUnicode(document.getElementById("beta-lemma").value);
        }

        // ==================== LSJ URN ====================
        async function loadLsjUrns() {
            try {
                const res = await fetch("./lsj_urns.txt");
                const text = await res.text();
                lsjUrns = new Set(text.trim().split("\n").map(l => l.trim()).filter(l => l.startsWith("urn:cite2:hmt:lsj.chicago_md:")));
            } catch(e) {
                document.getElementById("lsj-status").innerHTML = `<span class="text-amber-500">No lsj_urns.txt</span>`;
            }
        }

        function validateLsjUrn() {
            const el = document.getElementById("lsj-status");
            const val = document.getElementById("lsj-urn").value.trim();
            if (!val) { el.innerHTML = ""; return; }
            if (lsjUrns.has(val)) {
                el.innerHTML = `<span class="text-emerald-600">✓ valid</span>`;
            } else {
                el.innerHTML = `<span class="text-red-500">invalid</span>`;
            }
        }

        // ==================== INTELLIGENT POS MENUS ====================
        function updateEnabledMenus() {
            const pos = document.getElementById("pos-select").value;
            const allSelects = ["case","gender","number","degree","mood","voice","tense","person"].map(id => document.getElementById(id+"-select"));

            // disable everything first
            allSelects.forEach(s => s.disabled = true);

            if (["noun","pronoun","article"].includes(pos)) {
                document.getElementById("case-select").disabled = false;
                document.getElementById("gender-select").disabled = false;
                document.getElementById("number-select").disabled = false;
            } else if (pos === "adjective") {
                document.getElementById("case-select").disabled = false;
                document.getElementById("gender-select").disabled = false;
                document.getElementById("number-select").disabled = false;
                document.getElementById("degree-select").disabled = false;
            } else if (pos === "verb") {
                document.getElementById("mood-select").disabled = false;
                const mood = document.getElementById("mood-select").value;
                if (["ind","sub","imp","opt"].includes(mood)) {
                    ["voice","tense","person","number"].forEach(id => document.getElementById(id+"-select").disabled = false);
                } else if (mood === "inf") {
                    ["voice","tense"].forEach(id => document.getElementById(id+"-select").disabled = false);
                } else if (mood === "part") {
                    ["voice","tense","person","case","number"].forEach(id => document.getElementById(id+"-select").disabled = false);
                }
            } else if (pos === "adverb") {
                document.getElementById("degree-select").disabled = false;
            }
            // Preposition, Conjunction, Interjection, Punctuation, Irregular → nothing enabled
            updatePosPreview();
        }

        function updatePosPreview() {
            // Simple derived preview (you can expand this if needed)
            const pos = document.getElementById("pos-select").value || "-";
            document.getElementById("pos-preview").textContent = pos.toUpperCase().slice(0,1) + "--------";
        }

        function validateAndSetPos() {
            // For now just refreshes – you can add more validation later
            updatePosPreview();
            alert("POS tag validated and ready for use.");
        }

        // ==================== ENTRY MANAGEMENT ====================
        function addOrUpdateEntry() {
            const entry = {
                editor: document.getElementById("editor-name").value,
                textUrn: document.getElementById("text-urn").value,
                betaSurface: document.getElementById("beta-surface").value,
                unicodeSurface: document.getElementById("unicode-surface").value,
                betaLemma: document.getElementById("beta-lemma").value,
                unicodeLemma: document.getElementById("unicode-lemma").value,
                lsjUrn: document.getElementById("lsj-urn").value,
                pos: document.getElementById("pos-select").value,
                case: document.getElementById("case-select").value,
                gender: document.getElementById("gender-select").value,
                number: document.getElementById("number-select").value,
                degree: document.getElementById("degree-select").value,
                mood: document.getElementById("mood-select").value,
                voice: document.getElementById("voice-select").value,
                tense: document.getElementById("tense-select").value,
                person: document.getElementById("person-select").value
            };

            if (currentEditIndex >= 0) {
                entries[currentEditIndex] = entry;
                currentEditIndex = -1;
            } else {
                entries.push(entry);
            }

            renderEntries();
            clearForm();
        }

        function renderEntries() {
            const tbody = document.getElementById("entries-body");
            tbody.innerHTML = "";
            entries.forEach((e, i) => {
                const tr = document.createElement("tr");
                tr.className = "hover:bg-slate-50 cursor-pointer";
                tr.innerHTML = `
                    <td class="px-4 py-3">${e.unicodeSurface || e.betaSurface}</td>
                    <td class="px-4 py-3 greek">${e.unicodeLemma}</td>
                    <td class="px-4 py-3 font-mono">${e.pos}</td>
                    <td class="px-4 py-3 font-mono text-xs">${e.lsjUrn || "-"}</td>
                `;
                tr.onclick = () => editEntry(i);
                tbody.appendChild(tr);
            });
            document.getElementById("entry-count").textContent = entries.length;
        }

        function editEntry(index) {
            const e = entries[index];
            currentEditIndex = index;
            document.getElementById("editor-name").value = e.editor;
            document.getElementById("text-urn").value = e.textUrn;
            document.getElementById("beta-surface").value = e.betaSurface;
            document.getElementById("beta-lemma").value = e.betaLemma;
            updateUnicodeFields();
            document.getElementById("lsj-urn").value = e.lsjUrn;
            document.getElementById("pos-select").value = e.pos || "-";
            document.getElementById("case-select").value = e.case || "-";
            document.getElementById("gender-select").value = e.gender || "-";
            document.getElementById("number-select").value = e.number || "-";
            document.getElementById("degree-select").value = e.degree || "-";
            document.getElementById("mood-select").value = e.mood || "-";
            document.getElementById("voice-select").value = e.voice || "-";
            document.getElementById("tense-select").value = e.tense || "-";
            document.getElementById("person-select").value = e.person || "-";

            updateEnabledMenus();
            document.getElementById("button-text").textContent = "UPDATE ENTRY";
        }

        function clearForm() {
            document.getElementById("beta-surface").value = "";
            document.getElementById("beta-lemma").value = "";
            document.getElementById("unicode-surface").value = "";
            document.getElementById("unicode-lemma").value = "";
            document.getElementById("lsj-urn").value = "";
            document.getElementById("pos-select").value = "-";
            ["case","gender","number","degree","mood","voice","tense","person"].forEach(id => {
                const sel = document.getElementById(id+"-select");
                sel.value = "-";
                sel.disabled = true;
            });
            currentEditIndex = -1;
            document.getElementById("button-text").textContent = "ADD TO LIST";
            updateUnicodeFields();
        }

        // ==================== DOWNLOAD (two files) ====================
        function downloadBothFiles() {
            const date = new Date().toISOString().split("T")[0]; // YYYY-MM-DD

            // File 1: Editor Index (your requested name)
            let tsv1 = "editor\ttext_urn\tbeta_surface\tunicode_surface\tbeta_lemma\tunicode_lemma\tlsj_urn\tpos\tcase\tgender\tnumber\tdegree\tmood\tvoice\ttense\tperson\n";
            entries.forEach(e => {
                tsv1 += `${e.editor}\t${e.textUrn}\t${e.betaSurface}\t${e.unicodeSurface}\t${e.betaLemma}\t${e.unicodeLemma}\t${e.lsjUrn}\t${e.pos}\t${e.case}\t${e.gender}\t${e.number}\t${e.degree}\t${e.mood}\t${e.voice}\t${e.tense}\t${e.person}\n`;
            });

            const blob1 = new Blob([tsv1], { type: "text/tab-separated-values" });
            const url1 = URL.createObjectURL(blob1);
            const a1 = document.createElement("a");
            a1.href = url1;
            a1.download = `For_editor_index-${date}.tsv`;
            a1.click();
            URL.revokeObjectURL(url1);

            // File 2: Full morphological data (second file as requested)
            const blob2 = new Blob([tsv1], { type: "text/tab-separated-values" }); // same content for now; you can customize later
            const url2 = URL.createObjectURL(blob2);
            const a2 = document.createElement("a");
            a2.href = url2;
            a2.download = `morphological_data-${date}.tsv`;
            a2.click();
            URL.revokeObjectURL(url2);
        }

        // ==================== INIT ====================
        window.onload = () => {
            loadLsjUrns();
            // Tailwind script already loaded
        };
    </script>
</body>
</html>
